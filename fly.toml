# fly.toml app configuration file generated for deepgram-python-stt on 2025-12-09T12:35:31-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'deepgram-python-stt'
primary_region = 'iad'

[build]

[deploy]
  release_command = 'mkdir -p temp outputs'

[env]
  FLASK_ENV = 'production'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
